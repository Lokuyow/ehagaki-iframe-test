<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eHagaki iframe テスト</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>eHagaki iframe 埋め込みテスト</h1>
        <ul>
            <li>iframeテスト</li>
            <li>投稿成功時にpostMessageを受け取りダイアログが閉じるかテスト</li>
            <li>iframeを開く時にテキストボックス内の文字をエディターに入力して開くテスト</li>
            <li>リプライと引用リポストのテスト</li>
        </ul>

        <div class="control-group">
            <div class="control-group__title">ログイン</div>
            <button id="loginBtn" class="open-button button-success mt-10" title="ブラウザ拡張（NIP-07）でログイン">
                🔐 ブラウザ拡張でログイン
            </button>
            <!-- 秘密鍵ログイン UI (nsec1のみ、保存は平文HEX) -->
            <div id="skLogin">
                <form id="skLoginForm" class="sk-login-row" onsubmit="return false;">
                    <input type="password" id="skInput" placeholder="秘密鍵 (nsec1...) を入力" class="sk-input" />
                    <button type="button" id="skLoginBtn" class="open-button button-warning">🔑 秘密鍵でログイン</button>
                </form>
            </div>
        </div>

        <div class="control-group">
            <div class="control-group__title">投稿</div>
            <input type="text" id="contentInput" placeholder="投稿内容を入力..." class="mt-12" />
            <button id="openDialogBtn" class="open-button mt-10">
                📝 eHagaki を開く
            </button>
        </div>

        <h2 class="section-title">簡易タイムライン（wss://yabu.me）</h2>
        <div id="timelineStatus" class="timeline-status">タイムラインを接続中...</div>
        <div id="timeline" class="timeline"></div>

        <div id="status" class="status hidden"></div>
    </div>

    <!-- モーダルダイアログ -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-body">
                <iframe id="ehagaki-iframe" src="https://ehagaki.vercel.app/" class="ehagaki-iframe">
                </iframe>
            </div>
            <div class="modal-footer">
                <button id="closeBtn" class="close-button">&times;</button>
            </div>
        </div>
    </div>

    <script src="./nip07-poller.js"></script>
    <script src="./script.js"></script>
</body>

</html>
